name: Deploy Quarto Book to Cloudflare Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Diperlukan agar Quarto bisa memproses notebook (.ipynb) di website/notebooks/.
      # Notebook memakai `execute: enabled: false`, jadi sel TIDAK dijalankan saat build
      # (tidak perlu torch/transformers); jupyter hanya untuk membaca output tersimpan.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Jupyter (untuk render notebook, tanpa eksekusi)
        run: pip install jupyter

      - name: Render Quarto Book
        run: |
          quarto render website --to html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fe-m
          directory: website/_book
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
